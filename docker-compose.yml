services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: eldershield-backend
    environment:
      - DB_PATH=/app/data/eldershield.db
    volumes:
      - eldershield_data:/app/data
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health').read()"]
      interval: 20s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: eldershield-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"

volumes:
  eldershield_data:
